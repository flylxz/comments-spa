# Render Blueprint (free tier): one web service + one Postgres database.
# https://render.com/docs/blueprint-spec
#
# Free tier limits:
# - 1 web service (750 h/month, sleeps after ~15 min idle)
# - 1 Postgres database (expires after 90 days unless upgraded)
# - Uploaded files are ephemeral (no persistent disk on free plan)

services:
  - type: web
    name: comments-spa
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: comments-spa-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: comments-spa-db
    plan: free
    region: frankfurt
    databaseName: comments_spa
    user: comments_spa
